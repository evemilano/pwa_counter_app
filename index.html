<!doctype html>
<html lang="it" class="light">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
  <meta name="robots" content="noindex, nofollow">
  <meta name="theme-color" content="#fffafa" media="(prefers-color-scheme: light)">
  <meta name="theme-color" content="#1a1c1c" media="(prefers-color-scheme: dark)">
  <meta name="description" content="Counter — PWA per contare quante volte fai una cosa al giorno. Multi-contatore, grafici, cronologia, offline.">
  <title>Counter</title>
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png">
  <link rel="apple-touch-icon" href="icons/icon-192.png">

  <link rel="preload" href="fonts/inter-variable.woff2" as="font" type="font/woff2" crossorigin>
  <link rel="preload" href="fonts/montserrat-variable.woff2" as="font" type="font/woff2" crossorigin>
  <link rel="preload" href="fonts/material-symbols-outlined.woff2" as="font" type="font/woff2" crossorigin>
  <style>
    @font-face {
      font-family: "Inter";
      src: url("fonts/inter-variable.woff2") format("woff2");
      font-weight: 100 900;
      font-style: normal;
      font-display: block;
    }
    @font-face {
      font-family: "Montserrat";
      src: url("fonts/montserrat-variable.woff2") format("woff2");
      font-weight: 100 900;
      font-style: normal;
      font-display: block;
    }
    @font-face {
      font-family: "Material Symbols Outlined";
      src: url("fonts/material-symbols-outlined.woff2") format("woff2");
      font-weight: 100 700;
      font-style: normal;
      font-display: block;
    }
    .material-symbols-outlined {
      font-family: "Material Symbols Outlined" !important;
      font-weight: normal;
      font-style: normal;
      line-height: 1;
      letter-spacing: normal;
      text-transform: none;
      display: inline-block;
      white-space: nowrap;
      word-wrap: normal;
      direction: ltr;
      -webkit-font-feature-settings: "liga";
      font-feature-settings: "liga";
      -webkit-font-smoothing: antialiased;
      font-variation-settings: "FILL" 0, "wght" 400, "GRAD" 0, "opsz" 24;
      vertical-align: middle;
    }
  </style>

  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <script>
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            "primary": "#e85454",
            "primary-dark": "#c93838",
            "primary-fixed": "#fde2e2",
            "on-primary": "#ffffff",
            "primary-container": "#e85454",
            "surface": "#fffafa",
            "surface-bright": "#ffffff",
            "surface-container-lowest": "#ffffff",
            "surface-container-low": "#fbf4f4",
            "surface-container": "#f4eaea",
            "surface-container-high": "#ecdfdf",
            "surface-container-highest": "#e3d4d4",
            "surface-dim": "#d8c9c9",
            "surface-variant": "#e3d4d4",
            "on-surface": "#1a1c1c",
            "on-surface-variant": "#5a4a4a",
            "outline": "#8a7575",
            "outline-variant": "#d8c4c4",
            "error": "#8a1818",
            "error-container": "#ffd5d2",
            "on-error": "#ffffff",
            "success": "#10b981",
          },
          fontFamily: {
            h1: ["Montserrat", "system-ui", "sans-serif"],
            display: ["Montserrat", "system-ui", "sans-serif"],
            body: ["Inter", "system-ui", "sans-serif"],
          },
          fontSize: {
            "h1": ["32px", { lineHeight: "40px", fontWeight: "700" }],
            "label-caps": ["12px", { lineHeight: "16px", letterSpacing: "0.05em", fontWeight: "600" }],
            "body-md": ["16px", { lineHeight: "24px", fontWeight: "400" }],
            "body-lg": ["18px", { lineHeight: "28px", fontWeight: "400" }],
            "counter-display-mobile": ["96px", { lineHeight: "96px", letterSpacing: "-0.04em", fontWeight: "700" }],
            "counter-display": ["120px", { lineHeight: "110px", letterSpacing: "-0.04em", fontWeight: "700" }],
          },
        },
      },
    };
  </script>
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-surface text-on-surface font-body antialiased min-h-screen">

  <header id="topbar" class="bg-surface/85 backdrop-blur-md fixed top-0 inset-x-0 z-40 border-b border-outline-variant/30">
    <div class="flex items-center justify-between px-4 py-3 max-w-screen-md mx-auto">
      <button type="button" id="btn-menu" class="text-primary active:scale-95 transition-transform p-2" aria-label="Cambia contatore">
        <span class="material-symbols-outlined" style="font-size:28px">menu</span>
      </button>
      <h1 id="topbar-title" class="font-h1 text-h1 tracking-tighter text-primary">Counter</h1>
      <div class="flex items-center">
        <button type="button" id="btn-install" class="hidden text-primary active:scale-95 transition-transform p-2" aria-label="Installa app">
          <span class="material-symbols-outlined" style="font-size:28px">install_mobile</span>
        </button>
        <button type="button" id="btn-settings" class="text-primary active:scale-95 transition-transform p-2" aria-label="Impostazioni">
          <span class="material-symbols-outlined" style="font-size:28px">settings</span>
        </button>
      </div>
    </div>
  </header>

  <main id="app" class="max-w-screen-md mx-auto px-4 pt-[72px] pb-[96px]">
    <section id="view-dashboard" class="view"></section>
    <section id="view-stats" class="view hidden"></section>
    <section id="view-history" class="view hidden"></section>
    <section id="view-settings" class="view hidden"></section>
  </main>

  <nav id="bottomnav" class="bg-surface-container-lowest shadow-[0_-10px_30px_rgba(26,28,28,0.08)] fixed bottom-0 inset-x-0 flex justify-around items-center px-2 py-1 pb-[max(env(safe-area-inset-bottom),4px)] z-40 rounded-t-2xl border-t border-outline-variant/20">
    <button type="button" data-view="dashboard" class="navbtn active flex flex-col items-center justify-center px-3 py-2 rounded-xl transition-transform active:scale-95">
      <span class="material-symbols-outlined mb-0.5" style="font-size:24px">add_circle</span>
      <span class="text-label-caps font-semibold">Dashboard</span>
    </button>
    <button type="button" data-view="stats" class="navbtn flex flex-col items-center justify-center px-3 py-2 rounded-xl transition-transform active:scale-95">
      <span class="material-symbols-outlined mb-0.5" style="font-size:24px">leaderboard</span>
      <span class="text-label-caps font-semibold">Statistiche</span>
    </button>
    <button type="button" data-view="history" class="navbtn flex flex-col items-center justify-center px-3 py-2 rounded-xl transition-transform active:scale-95">
      <span class="material-symbols-outlined mb-0.5" style="font-size:24px">history</span>
      <span class="text-label-caps font-semibold">Cronologia</span>
    </button>
  </nav>

  <div id="drawer" class="hidden fixed inset-0 z-50">
    <div class="absolute inset-0 bg-black/40" data-drawer-close></div>
    <aside class="absolute left-0 top-0 bottom-0 w-[85%] max-w-sm bg-surface-container-lowest shadow-2xl flex flex-col">
      <div class="flex items-center justify-between p-4 border-b border-outline-variant/30">
        <h2 class="font-h1 text-xl text-on-surface">Contatori</h2>
        <button type="button" class="text-on-surface-variant p-2" data-drawer-close aria-label="Chiudi">
          <span class="material-symbols-outlined">close</span>
        </button>
      </div>
      <div id="drawer-list" class="flex-1 overflow-y-auto p-3 space-y-2"></div>
      <div class="p-4 border-t border-outline-variant/30">
        <div class="flex gap-2">
          <input type="text" id="drawer-new-name" placeholder="Nuovo contatore" maxlength="40"
            class="flex-1 rounded-xl border border-outline-variant px-3 py-2 bg-surface-container-low text-on-surface focus:outline-none focus:border-primary">
          <button type="button" id="drawer-add"
            class="bg-primary text-on-primary px-4 py-2 rounded-xl font-semibold active:scale-95 transition-transform">
            Aggiungi
          </button>
        </div>
      </div>
    </aside>
  </div>

  <div id="toast" class="hidden fixed left-1/2 -translate-x-1/2 bottom-24 bg-on-surface text-surface px-5 py-3 rounded-full text-sm font-medium shadow-lg z-[60] transition-all"></div>

  <div id="modal-root"></div>

  <script type="module" src="js/app.js"></script>
</body>
</html>
